<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Travel Mantra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Canadian+Aboriginal:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --red: #C41E3A;
      --red-dark: #9B1C2E;
      --ink: #1C1917;
      --line: #E7E5E4;
      --white: #FFFFFF;
      --bg: #FAFAF9;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    @media (min-width: 640px) { body { padding: 40px 24px; } }
    @media (min-width: 1024px) { body { padding: 48px 40px; } }
    .hub { max-width: 960px; width: 100%; text-align: center; }
    @media (min-width: 1024px) {
      .hub { max-width: 1100px; }
      .cards { grid-template-columns: repeat(3, 1fr); gap: 28px; }
      .card { padding: 36px 32px; }
    }
    @media (min-width: 1280px) {
      .hub { max-width: 1200px; }
      .cards { gap: 32px; }
    }

    /* Design 2 — stacked TRAVEL / MANTRA wordmark */
    .brand-logo--native {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      line-height: 1;
      gap: 0.2rem;
      margin-bottom: 48px;
    }
    .brand-logo--native .brand-native-word {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      font-family: 'Noto Sans Canadian Aboriginal', 'Outfit', system-ui, sans-serif;
      font-weight: 600;
      letter-spacing: 0.14em;
    }
    .brand-logo--native .brand-native-line {
      display: block;
      line-height: 1.05;
      white-space: nowrap;
    }
    .brand-logo--native .brand-native-line--travel {
      font-size: clamp(1.35rem, 4vw, 1.85rem);
    }
    .brand-logo--native .brand-native-line--mantra {
      font-size: clamp(1.55rem, 4.5vw, 2.1rem);
      padding-left: 0.2em;
      letter-spacing: 0.16em;
    }
    .brand-logo--native .brand-accent { color: var(--red); }
    .brand-logo--native .brand-base { color: var(--ink); }
    @media (min-width: 768px) {
      .brand-logo--native .brand-native-line--travel { font-size: clamp(1.5rem, 3vw, 2rem); }
      .brand-logo--native .brand-native-line--mantra {
        font-size: clamp(1.75rem, 3.5vw, 2.25rem);
        padding-left: 0.25em;
        letter-spacing: 0.18em;
      }
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }
    .card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 32px 28px;
      text-decoration: none;
      color: inherit;
      transition: all 0.25s ease;
      text-align: left;
      box-shadow: 0 1px 3px rgba(28, 25, 23, 0.05);
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(196, 30, 58, 0.3);
      box-shadow: 0 12px 28px rgba(196, 30, 58, 0.1);
    }
    .card-tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 12px;
      border-radius: 999px;
      margin-bottom: 16px;
      background: #FDF2F4;
      color: var(--red);
    }
    .card-cta {
      color: var(--red);
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
    }
    .card:hover .card-cta { color: var(--red-dark); }
  </style>
</head>
<body>
  <div class="hub">
    <div class="brand-logo--native" aria-label="Travel Mantra">
      <span class="brand-native-word" aria-hidden="true">
        <span class="brand-native-line brand-native-line--travel">
          <span class="brand-accent">T</span><span class="brand-base">ᖇᗩᐯEᒪ</span>
        </span>
        <span class="brand-native-line brand-native-line--mantra">
          <span class="brand-accent">ᗰ</span><span class="brand-base">ᗩᑎTᖇᗩ</span>
        </span>
      </span>
    </div>
    <div class="cards">
      <a href="design1/" class="card design1 js-design-link" target="_blank" rel="noopener noreferrer">
        <span class="card-tag">Design1</span>
        <span class="card-cta">View Design1 &rarr;</span>
      </a>
      <a href="design2/index.html" class="card design2 js-design-link" target="_blank" rel="noopener noreferrer">
        <span class="card-tag">Design2</span>
        <span class="card-cta">View Design2 &rarr;</span>
      </a>
      <a href="design3/index.html" class="card design3 js-design-link" target="_blank" rel="noopener noreferrer">
        <span class="card-tag">Design3</span>
        <span class="card-cta">View Design3 &rarr;</span>
      </a>
    </div>
  </div>
  <script>
    (function () {
      function openDesignInNewTab(event) {
        var link = event.currentTarget;
        var url = new URL(link.getAttribute('href'), window.location.href).href;
        event.preventDefault();
        var newTab = window.open(url, '_blank', 'noopener,noreferrer');
        if (!newTab) {
          var fallback = document.createElement('a');
          fallback.href = url;
          fallback.target = '_blank';
          fallback.rel = 'noopener noreferrer';
          document.body.appendChild(fallback);
          fallback.click();
          fallback.remove();
        }
      }
      document.querySelectorAll('.js-design-link').forEach(function (link) {
        link.addEventListener('click', openDesignInNewTab);
      });
    })();
  </script>
</body>
</html>
