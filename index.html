<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Travels Mantra | Design Variations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,600;0,700;1,600;1,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100dvh;
      background: linear-gradient(145deg, #141428 0%, #1e1b4b 42%, #312e81 78%, #4c1d3a 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    @media (min-width: 640px) {
      body { padding: 40px 24px; }
    }
    @media (min-width: 1024px) {
      body { padding: 48px 40px; }
    }
    @media (min-width: 1280px) {
      body { padding: 56px 48px; }
    }
    .hub { max-width: 960px; width: 100%; text-align: center; }
    @media (min-width: 1024px) {
      .hub { max-width: 1100px; }
      .cards { grid-template-columns: repeat(3, 1fr); gap: 28px; }
      .card { padding: 36px 32px; }
    }
    @media (min-width: 1280px) {
      .hub { max-width: 1200px; }
      .cards { gap: 32px; }
    }
    .hub h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(2rem, 5vw, 3rem);
      margin-bottom: 48px;
      font-weight: 700;
      font-style: italic;
      letter-spacing: -0.02em;
    }
    .hub h1 .hub-travels {
      display: block;
      font-family: 'Outfit', sans-serif;
      font-size: 0.72rem;
      font-style: normal;
      font-weight: 600;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.55);
      margin-bottom: 0.35rem;
    }
    .hub h1 .hub-mantra em { font-style: normal; color: #FBBF24; }
    .hub h1 span { color: #F9A8D4; font-style: italic; font-size: 0.85em; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 24px; }
    .card {
      background: rgba(99, 102, 241, 0.08);
      border: 1px solid rgba(167, 139, 250, 0.18);
      border-radius: 24px;
      padding: 32px 28px;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
      text-align: left;
    }
    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(244, 114, 182, 0.45);
      background: rgba(244, 114, 182, 0.1);
      box-shadow: 0 20px 60px rgba(30, 27, 75, 0.45);
    }
    .card-tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 12px;
      border-radius: 999px;
      margin-bottom: 16px;
    }
    .card-cta { color: #FBBF24; font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 6px; margin-top: 8px; }
    .design1 .card-tag { background: rgba(99, 102, 241, 0.22); color: #A5B4FC; }
    .design2 .card-tag { background: rgba(244, 114, 182, 0.18); color: #F9A8D4; }
    .design3 .card-tag { background: rgba(251, 191, 36, 0.15); color: #FCD34D; }
  </style>
</head>
<body>
  <div class="hub">
    <h1><span class="hub-travels">Travels</span><span class="hub-mantra"><em>M</em>antra</span> <span>Design Hub</span></h1>
    <div class="cards">
      <a href="design1/" class="card design1">
        <span class="card-tag">Design1</span>
        <span class="card-cta">View Design1 &rarr;</span>
      </a>
      <a href="design2/index.html" class="card design2">
        <span class="card-tag">Design2</span>
        <span class="card-cta">View Design2 &rarr;</span>
      </a>
      <a href="design3/index.html" class="card design3">
        <span class="card-tag">Design3</span>
        <span class="card-cta">View Design3 &rarr;</span>
      </a>
    </div>
  </div>
</body>
</html>
